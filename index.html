<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVIEW INSIGHT | AI SENTIMENT ANALYZER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-canvas: #000000;
            --color-surface: #0d0d0d;
            --color-card: #1a1a1a;
            --color-border: #3c3c3c;
            --color-text: #ffffff;
            --color-body: #bbbbbb;
            --m-blue-light: #0066b1;
            --m-blue-dark: #1c69d4;
            --m-red: #e22718;
            --font-main: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
        body { background-color: var(--color-canvas); color: var(--color-text); font-family: var(--font-main); overflow-x: hidden; }
        .m-stripe-container { height: 4px; display: flex; width: 100%; position: fixed; top: 0; left: 0; z-index: 1000; }
        .stripe { height: 100%; }
        .blue-light { flex: 1; background-color: var(--m-blue-light); }
        .blue-dark { flex: 1; background-color: var(--m-blue-dark); }
        .red { flex: 1; background-color: var(--m-red); }
        .top-nav { height: 60px; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; padding: 0 40px; margin-top: 4px; }
        .nav-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; }
        .logo .thin { font-weight: 300; }
        .system-status { font-size: 0.7rem; color: var(--m-blue-light); letter-spacing: 1px; font-weight: 700; }
        .hero { min-height: calc(100vh - 120px); display: flex; justify-content: center; align-items: center; padding: 40px; }
        .hero-content { width: 100%; max-width: 800px; }
        .main-title { font-size: 4.5rem; font-weight: 900; line-height: 0.9; letter-spacing: -2px; margin-bottom: 10px; }
        .subtitle { font-size: 0.8rem; font-weight: 400; color: var(--color-body); letter-spacing: 4px; margin-bottom: 60px; }
        .input-container { display: flex; flex-direction: column; gap: 1px; background-color: var(--color-border); border: 1px solid var(--color-border); }
        textarea { width: 100%; height: 200px; background-color: var(--color-surface); border: none; color: var(--color-text); padding: 20px; font-family: var(--font-main); font-size: 1.1rem; resize: none; outline: none; }
        textarea:focus { background-color: var(--color-card); }
        .action-bar { background-color: var(--color-surface); display: flex; justify-content: flex-end; padding: 10px; }
        button { background-color: var(--color-text); color: var(--color-canvas); border: none; padding: 12px 40px; font-weight: 900; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; transition: all 0.2s ease; }
        button:hover { background-color: var(--m-blue-dark); color: white; }
        button:disabled { background-color: var(--color-border); color: var(--color-body); cursor: not-allowed; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 1; transition: opacity 0.3s ease; }
        .modal-overlay.hidden { display: none; opacity: 0; }
        .modal-card { background-color: var(--color-card); border: 1px solid var(--color-border); width: 100%; max-width: 500px; transform: translateY(0); transition: transform 0.4s ease-out; }
        .modal-overlay.hidden .modal-card { transform: translateY(40px); }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 1rem; letter-spacing: 2px; font-weight: 900; }
        .close-btn { background: none; color: var(--color-body); font-size: 1.5rem; padding: 0; width: auto; }
        .close-btn:hover { color: white; background: none; }
        .modal-body { padding: 30px 20px; display: flex; flex-direction: column; gap: 25px; }
        .result-row { display: flex; align-items: baseline; gap: 15px; }
        .result-row.column { flex-direction: column; gap: 10px; }
        .label { font-size: 0.7rem; font-weight: 700; color: var(--color-body); letter-spacing: 1px; min-width: 100px; }
        .value { font-size: 1.5rem; font-weight: 900; }
        .value.positive { color: #00ff88; }
        .value.negative { color: #ff3333; }
        .value.neutral { color: #ffcc00; }
        .confidence-container { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .progress-bg { height: 4px; background-color: var(--color-border); width: 100%; }
        .progress-fill { height: 100%; background-color: var(--m-blue-light); transition: width 1s ease-out; }
        .reason-text { font-size: 0.95rem; line-height: 1.6; color: var(--color-body); font-weight: 300; }
        .modal-footer { padding: 20px; border-top: 1px solid var(--color-border); display: flex; justify-content: flex-end; }
        .footer { height: 60px; display: flex; justify-content: center; align-items: center; border-top: 1px solid var(--color-border); font-size: 0.6rem; color: var(--color-border); letter-spacing: 2px; }
        @media (max-width: 768px) { .main-title { font-size: 3rem; } .hero { padding: 20px; } .top-nav { padding: 0 20px; } }
    </style>
</head>
<body>
    <div class="m-stripe-container">
        <div class="stripe blue-light"></div>
        <div class="stripe blue-dark"></div>
        <div class="stripe red"></div>
    </div>
    <nav class="top-nav">
        <div class="nav-content">
            <span class="logo">REVIEW <span class="thin">INSIGHT</span></span>
            <span class="system-status">SYSTEM READY</span>
        </div>
    </nav>
    <main class="hero">
        <section class="hero-content">
            <h1 class="main-title">AI SENTIMENT<br>ANALYZER</h1>
            <p class="subtitle">INDUSTRIAL PRECISION EMOTION ANALYSIS ENGINE</p>
            <div class="input-container">
                <textarea id="textInput" placeholder="분석할 텍스트를 입력하세요..."></textarea>
                <div class="action-bar">
                    <button id="analyzeBtn">ANALYZE</button>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <p>&copy; 2026 REVIEW INSIGHT. ALL RIGHTS RESERVED.</p>
    </footer>
    <div id="resultModal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>ANALYSIS RESULT</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="result-row">
                    <span class="label">SENTIMENT:</span>
                    <span id="sentimentValue" class="value positive">POSITIVE</span>
                </div>
                <div class="result-row">
                    <span class="label">CONFIDENCE:</span>
                    <div class="confidence-container">
                        <span id="confidenceValue" class="value">92%</span>
                        <div class="progress-bg">
                            <div id="confidenceBar" class="progress-fill"></div>
                        </div>
                    </div>
                </div>
                <div class="result-row column">
                    <span class="label">REASONING:</span>
                    <p id="reasonValue" class="reason-text"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="modalOkBtn">OK</button>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const textInput = document.getElementById('textInput');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const resultModal = document.getElementById('resultModal');
            const closeModal = document.getElementById('closeModal');
            const modalOkBtn = document.getElementById('modalOkBtn');
            const sentimentValue = document.getElementById('sentimentValue');
            const confidenceValue = document.getElementById('confidenceValue');
            const confidenceBar = document.getElementById('confidenceBar');
            const reasonValue = document.getElementById('reasonValue');
            const systemStatus = document.querySelector('.system-status');
            const setUIState = (state) => {
                switch (state) {
                    case 'IDLE':
                        analyzeBtn.textContent = 'ANALYZE';
                        analyzeBtn.disabled = false;
                        textInput.disabled = false;
                        systemStatus.textContent = 'SYSTEM READY';
                        systemStatus.style.color = 'var(--m-blue-light)';
                        break;
                    case 'LOADING':
                        analyzeBtn.textContent = 'ANALYZING...';
                        analyzeBtn.disabled = true;
                        textInput.disabled = true;
                        systemStatus.textContent = 'PROCESSING DATA...';
                        systemStatus.style.color = 'var(--m-red)';
                        break;
                }
            };
            const openModal = (data) => {
                sentimentValue.textContent = data.sentiment;
                sentimentValue.className = `value ${data.sentimentType}`;
                confidenceValue.textContent = `${data.confidence}%`;
                confidenceBar.style.width = '0%';
                reasonValue.textContent = data.reason;
                resultModal.classList.remove('hidden');
                setTimeout(() => { confidenceBar.style.width = `${data.confidence}%`; }, 300);
            };
            const hideModal = () => { resultModal.classList.add('hidden'); };
            const analyzeSentiment = async (text) => {
                setUIState('LOADING');
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text })
                    });
                    const result = await response.json();
                    if (result.success) { openModal(result.data); }
                    else { alert(`에러: ${result.error || '분석에 실패했습니다.'}`); }
                } catch (error) {
                    console.error('Fetch Error:', error);
                    alert('서버 연결에 실패했습니다. 백엔드가 실행 중인지 확인하세요.');
                } finally { setUIState('IDLE'); }
            };
            analyzeBtn.addEventListener('click', () => {
                const text = textInput.value.trim();
                if (text) { analyzeSentiment(text); }
                else { alert('분석할 텍스트를 입력해 주세요.'); }
            });
            closeModal.addEventListener('click', hideModal);
            modalOkBtn.addEventListener('click', hideModal);
            resultModal.addEventListener('click', (e) => { if (e.target === resultModal) { hideModal(); } });
            window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !resultModal.classList.contains('hidden')) { hideModal(); } });
        });
    </script>
</body>
</html>
